<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>St. John's English School - Escort Card</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px 10px; }
        .form-container { max-width: 600px; margin: 0 auto; background: white; border-radius: 20px; box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3); overflow: hidden; animation: slideUp 0.5s ease-out; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .form-header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 30px 20px; color: white; text-align: center; }
        .form-header h1 { font-size: 1.8rem; margin-bottom: 5px; font-weight: 700; }
        .form-header p { font-size: 0.95rem; opacity: 0.9; }
        .form-content { padding: 30px 20px; }
        .form-group { margin-bottom: 24px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #333; font-size: 0.95rem; }
        .required { color: #ef4444; margin-left: 3px; }
        input, select { width: 100%; padding: 12px 15px; border: 2px solid #e5e7eb; border-radius: 10px; font-size: 1rem; transition: all 0.3s ease; }
        input:focus, select:focus { outline: none; border-color: #667eea; box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1); }
        .photo-upload-section { background: #f9fafb; border: 2px dashed #667eea; border-radius: 12px; padding: 20px; text-align: center; cursor: pointer; }
        .upload-icon { font-size: 2.5rem; color: #667eea; margin-bottom: 10px; }
        .preview-image { max-width: 100%; max-height: 250px; border-radius: 10px; display: block; margin: 15px auto; }
        .remove-photo { background: #ef4444; color: white; border: none; padding: 6px 12px; border-radius: 6px; cursor: pointer; margin-top: 10px; }
        .form-actions { display: flex; gap: 12px; margin-top: 30px; }
        button[type="submit"] { flex: 2; padding: 14px; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; border-radius: 10px; font-weight: 700; cursor: pointer; border: none; }
        button[type="reset"] { flex: 1; padding: 14px; background: #f3f4f6; color: #333; border-radius: 10px; cursor: pointer; border: none; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .modal.show { display: flex; }
        .modal-content { background: white; padding: 30px; border-radius: 15px; text-align: center; max-width: 400px; width: 100%; }
        .spinner { border: 3px solid rgba(255,255,255,.3); border-top: 3px solid #fff; border-radius: 50%; width: 16px; height: 16px; animation: spin 1s linear infinite; display: inline-block; margin-right: 8px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="form-container">
        <div class="form-header">
            <h1><i class="fas fa-graduation-cap"></i> St. John's English School</h1>
            <p>Escort Card Registration Form</p>
        </div>
        
        <div class="form-content">
            <form id="escortCardForm">
                <div class="form-group">
                    <label>Student Name <span class="required">*</span></label>
                    <input type="text" id="studentName" required>
                </div>
                
                <div class="form-group">
                    <label>Class <span class="required">*</span></label>
                    <select id="studentClass" required>
                        <option value="">Select Class</option>
                        <option value="PG">PG</option>
                        <option value="NURSERY">NURSERY</option>
                        <option value="LKG">LKG</option>
                        <option value="UKG">UKG</option>
                        <option value="CLASS I">CLASS I</option>
                        <option value="CLASS II">CLASS II</option>
                        <option value="CLASS III">CLASS III</option>
                        <option value="CLASS IV">CLASS IV</option>
                    </select>
                </div>
                
                <div class="form-group">
                    <label>Roll Number <span class="required">*</span></label>
                    <input type="number" id="rollNumber" required>
                </div>
                
                <div class="form-group">
                    <label>Student Photo <span class="required">*</span></label>
                    <div class="photo-upload-section" onclick="document.getElementById('studentPhoto').click()">
                        <div class="upload-icon"><i class="fas fa-camera"></i></div>
                        <div class="upload-text">Click to upload (413 × 531 px)</div>
                        <input type="file" id="studentPhoto" accept="image/*" style="display:none">
                    </div>
                    <div id="studentPhotoPreview"></div>
                </div>

                <div class="form-group">
                    <label>Mother Photo <span class="required">*</span></label>
                    <div class="photo-upload-section" onclick="document.getElementById('motherPhoto').click()">
                        <div class="upload-icon"><i class="fas fa-camera"></i></div>
                        <input type="file" id="motherPhoto" accept="image/*" style="display:none">
                    </div>
                    <div id="motherPhotoPreview"></div>
                </div>

                <div class="form-group">
                    <label>Father Photo</label>
                    <div class="photo-upload-section" onclick="document.getElementById('fatherPhoto').click()">
                        <div class="upload-icon"><i class="fas fa-camera"></i></div>
                        <input type="file" id="fatherPhoto" accept="image/*" style="display:none">
                    </div>
                    <div id="fatherPhotoPreview"></div>
                </div>

                <div class="form-group">
                    <label>Mother Name <span class="required">*</span></label>
                    <input type="text" id="motherName" required>
                </div>

                <div class="form-group">
                    <label>Mother Contact <span class="required">*</span></label>
                    <input type="tel" id="motherContact" required>
                </div>

                <div class="form-group">
                    <label>Father Name</label>
                    <input type="text" id="fatherName">
                </div>

                <div class="form-group">
                    <label>Father Contact</label>
                    <input type="tel" id="fatherContact">
                </div>

                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="emailAddress">
                </div>
                
                <div class="form-actions">
                    <button type="submit" id="submitBtn">Submit</button>
                    <button type="reset" onclick="location.reload()">Clear</button>
                </div>
            </form>
        </div>
    </div>

    <div class="modal" id="successModal">
        <div class="modal-content">
            <i class="fas fa-check-circle text-5xl text-green-500 mb-4"></i>
            <h2 class="text-xl font-bold mb-2">Success!</h2>
            <p class="mb-6">Registration submitted successfully.</p>
            <button class="bg-indigo-600 text-white px-8 py-2 rounded" onclick="location.reload()">Done</button>
        </div>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbz0J7M8ck0ayb5qro5RJV71P_6kJkjmbFy3AIF9FqYjuhdmGxAaK7_26JyuAKrk8SeT/exec";

        const photoData = { studentPhoto: "", fatherPhoto: "", motherPhoto: "" };

        // Fix: Preview Logic and Canvas Resizing
        ['studentPhoto', 'fatherPhoto', 'motherPhoto'].forEach(id => {
            const input = document.getElementById(id);
            input.addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = function(event) {
                    const img = new Image();
                    img.onload = function() {
                        const canvas = document.createElement('canvas');
                        canvas.width = 413; canvas.height = 531;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, 413, 531);
                        const base64 = canvas.toDataURL('image/jpeg', 0.9);
                        photoData[id] = base64;
                        document.getElementById(id + 'Preview').innerHTML = `
                            <img src="${base64}" class="preview-image">
                            <button type="button" class="remove-photo" onclick="removePhoto('${id}')">Remove</button>
                        `;
                    };
                    img.src = event.target.result;
                };
                reader.readAsDataURL(file);
            });
        });

        function removePhoto(id) {
            photoData[id] = "";
            document.getElementById(id).value = "";
            document.getElementById(id + 'Preview').innerHTML = "";
        }

        document.getElementById('escortCardForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner"></span>Submitting...';

            const payload = {
                timestamp: new Date().toLocaleString('en-IN'),
                studentName: document.getElementById('studentName').value,
                studentClass: document.getElementById('studentClass').value,
                rollNumber: document.getElementById('rollNumber').value,
                fatherName: document.getElementById('fatherName').value,
                fatherContact: document.getElementById('fatherContact').value,
                motherName: document.getElementById('motherName').value,
                motherContact: document.getElementById('motherContact').value,
                emailAddress: document.getElementById('emailAddress').value,
                studentPhotoBase64: photoData.studentPhoto,
                fatherPhotoBase64: photoData.fatherPhoto,
                motherPhotoBase64: photoData.motherPhoto
            };

            try {
                await fetch(WEB_APP_URL, {
                    method: 'POST',
                    mode: 'no-cors',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                document.getElementById('successModal').classList.add('show');
            } catch (err) {
                alert("Submission failed: " + err.message);
                btn.disabled = false;
                btn.innerHTML = "Submit";
            }
        });
    </script>
</body>
</html>
