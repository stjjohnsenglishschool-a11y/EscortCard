<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>St. John's English School - Escort Card</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { font-family: 'Segoe UI', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px 10px; }
        .form-container { max-width: 600px; margin: 0 auto; background: white; border-radius: 20px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); overflow: hidden; }
        .form-header { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 30px 20px; color: white; text-align: center; }
        .form-content { padding: 30px 20px; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 600; color: #333; }
        input, select { width: 100%; padding: 12px; border: 2px solid #e5e7eb; border-radius: 10px; outline: none; }
        input:focus { border-color: #667eea; }
        .photo-upload-section { background: #f9fafb; border: 2px dashed #667eea; border-radius: 12px; padding: 15px; text-align: center; cursor: pointer; }
        .preview-image { max-width: 150px; border-radius: 10px; margin: 10px auto; display: block; }
        .error-message { color: #ef4444; font-size: 0.85rem; display: none; margin-top: 5px; }
        button { width: 100%; padding: 14px; border-radius: 10px; font-weight: 700; cursor: pointer; transition: 0.3s; }
        .btn-submit { background: #764ba2; color: white; }
        .btn-submit:disabled { opacity: 0.5; }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 50; }
        .modal.show { display: flex; }
        .spinner { border: 3px solid rgba(255,255,255,0.3); border-top: 3px solid #fff; border-radius: 50%; width: 20px; height: 20px; animation: spin 1s linear infinite; display: inline-block; margin-right: 10px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="form-container">
    <div class="form-header">
        <h1 class="text-2xl font-bold">St. John's English School</h1>
        <p>Escort Card Registration</p>
    </div>

    <form id="escortCardForm" class="form-content">
        <div class="form-group">
            <label>Student Name *</label>
            <input type="text" id="studentName" required>
        </div>

        <div class="grid grid-cols-2 gap-4">
            <div class="form-group">
                <label>Class *</label>
                <select id="studentClass" required>
                    <option value="">Select</option>
                    <option value="PG">PG</option><option value="NURSERY">Nursery</option>
                    <option value="LKG">LKG</option><option value="UKG">UKG</option>
                    <option value="I">I</option><option value="II">II</option>
                </select>
            </div>
            <div class="form-group">
                <label>Roll Number *</label>
                <input type="number" id="rollNumber" required>
            </div>
        </div>

        <div class="form-group">
            <label>Student Photo (413x531) *</label>
            <div class="photo-upload-section" onclick="document.getElementById('studentPhotoInput').click()">
                <i class="fas fa-camera text-2xl mb-2 text-indigo-500"></i>
                <p class="text-xs text-gray-500">Click to upload</p>
                <input type="file" id="studentPhotoInput" accept="image/*" class="hidden">
                <div id="studentPreview"></div>
            </div>
        </div>

        <div class="form-group">
            <label>Mother Photo *</label>
            <div class="photo-upload-section" onclick="document.getElementById('motherPhotoInput').click()">
                <i class="fas fa-camera text-2xl mb-2 text-indigo-500"></i>
                <input type="file" id="motherPhotoInput" accept="image/*" class="hidden">
                <div id="motherPreview"></div>
            </div>
        </div>

        <div class="form-group">
            <label>Father Photo (Optional)</label>
            <div class="photo-upload-section" onclick="document.getElementById('fatherPhotoInput').click()">
                <i class="fas fa-camera text-2xl mb-2 text-indigo-500"></i>
                <input type="file" id="fatherPhotoInput" accept="image/*" class="hidden">
                <div id="fatherPreview"></div>
            </div>
        </div>

        <div class="form-group">
            <label>Mother Name *</label>
            <input type="text" id="motherName" required>
        </div>

        <div class="form-group">
            <label>Mother Contact (WhatsApp) *</label>
            <input type="tel" id="motherContact" placeholder="10 Digit Number" required>
        </div>

        <div class="form-group">
            <label>Father Name</label>
            <input type="text" id="fatherName">
        </div>

        <div class="form-group">
            <label>Father Contact</label>
            <input type="tel" id="fatherContact">
        </div>

        <div class="form-group">
            <label>Email Address</label>
            <input type="email" id="emailAddress">
        </div>

        <button type="submit" id="submitBtn" class="btn-submit">Submit Form</button>
    </form>
</div>

<!-- Modals -->
<div id="successModal" class="modal">
    <div class="bg-white p-8 rounded-xl text-center max-w-sm mx-4">
        <i class="fas fa-check-circle text-5xl text-green-500 mb-4"></i>
        <h2 class="text-xl font-bold mb-2">Success!</h2>
        <p class="text-gray-600 mb-6">Data has been saved to the school records.</p>
        <button onclick="location.reload()" class="btn-submit">Close</button>
    </div>
</div>

<script>
    // PASTE YOUR GOOGLE WEB APP URL HERE
    const WEB_APP_URL = "PASTE_YOUR_DEPLOYED_URL_HERE";

    const photos = {
        student: { input: 'studentPhotoInput', preview: 'studentPreview', data: null },
        mother: { input: 'motherPhotoInput', preview: 'motherPreview', data: null },
        father: { input: 'fatherPhotoInput', preview: 'fatherPreview', data: null }
    };

    // Handle Photo Previews and Resizing
    Object.keys(photos).forEach(key => {
        document.getElementById(photos[key].input).addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(event) {
                const img = new Image();
                img.onload = function() {
                    const canvas = document.createElement('canvas');
                    canvas.width = 413;
                    canvas.height = 531;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, 413, 531);
                    const base64 = canvas.toDataURL('image/jpeg', 0.8);
                    photos[key].data = base64;
                    document.getElementById(photos[key].preview).innerHTML = `<img src="${base64}" class="preview-image">`;
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        });
    });

    document.getElementById('escortCardForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        if (!photos.student.data || !photos.mother.data) {
            alert("Student and Mother photos are required!");
            return;
        }

        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerHTML = `<span class="spinner"></span> Processing...`;

        const payload = {
            timestamp: new Date().toLocaleString('en-IN'),
            studentName: document.getElementById('studentName').value,
            studentClass: document.getElementById('studentClass').value,
            rollNumber: document.getElementById('rollNumber').value,
            motherName: document.getElementById('motherName').value,
            motherContact: document.getElementById('motherContact').value,
            fatherName: document.getElementById('fatherName').value,
            fatherContact: document.getElementById('fatherContact').value,
            emailAddress: document.getElementById('emailAddress').value,
            studentPhotoBase64: photos.student.data,
            motherPhotoBase64: photos.mother.data,
            fatherPhotoBase64: photos.father.data
        };

        try {
            const response = await fetch(WEB_APP_URL, {
                method: "POST",
                mode: "no-cors", // This is normal for Google Apps Script
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });

            // Since no-cors doesn't allow reading response, we show success after a small delay
            document.getElementById('successModal').classList.add('show');
        } catch (error) {
            alert("Error submitting: " + error.message);
            btn.disabled = false;
            btn.innerHTML = "Submit Form";
        }
    });
</script>
</body>
</html>
